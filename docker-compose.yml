services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camunda-cleaner-backend
    ports:
      - "7171:7171"
    environment:
      - CAMUNDA_BASE_URL=${CAMUNDA_BASE_URL:-http://localhost:8080/engine-rest}
      - CAMUNDA_USER=${CAMUNDA_USER:-demo}
      - CAMUNDA_PASSWORD=${CAMUNDA_PASSWORD:-demo}
      - PORT=7171
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7171/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: camunda-cleaner-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
